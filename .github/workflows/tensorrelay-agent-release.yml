name: TensorRelay Agent Release

# Builds the harness binary for TensorRelay's Agent surface (ADR-0030) and
# publishes it as a per-commit GitHub Release. The tensorrelay Steam build
# fetches the asset for the pinned fork commit — the same fork-CI-publishes /
# client-fetches pattern the llama.cpp fork uses for the Windows GPU executor.
#
# Assets, under tag `tensorrelay-agent-<sha>`:
#   tensorrelay-agent-linux-x64.zip    -> tensorrelay-agent
#   tensorrelay-agent-windows-x64.zip  -> tensorrelay-agent.exe

on:
  push:
    branches: [main]
    paths:
      # Rebuild only when harness code (not the TensorRelay docs) changes.
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/tensorrelay-agent-release.yml"
  workflow_dispatch: {}

concurrency:
  group: tr-agent-release-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: tensorrelay-agent-linux-x64.zip
            bin: xai-grok-pager
            out: tensorrelay-agent
          - os: windows-latest
            asset: tensorrelay-agent-windows-x64.zip
            bin: xai-grok-pager.exe
            out: tensorrelay-agent.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # xai-grok-tools-api/build.rs compiles protobufs; the checked-in
      # bin/protoc is a Linux x64 binary (wrong on the Windows runner, and not
      # reliably executable after checkout), so install a real protoc in PATH
      # on both platforms.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      # The build script checks $PROTOC first, then a checked-in bin/protoc
      # (a Linux-only dotslash wrapper), then PATH. Point $PROTOC straight at
      # the just-installed binary so Windows doesn't trip over the wrapper.
      - name: Pin PROTOC to the installed binary
        shell: bash
        run: |
          P="$(command -v protoc)"
          # Windows: the Rust build script does PathBuf::from($PROTOC); a
          # git-bash unix path (/c/...) won't resolve, so convert to native.
          if [ "$RUNNER_OS" = "Windows" ]; then P="$(cygpath -w "$P")"; fi
          echo "PROTOC=$P" >> "$GITHUB_ENV"

      # Two build scripts (xai-grok-tools, xai-grok-shell) otherwise DOWNLOAD
      # ripgrep from github.com at build time — flaky and offline-hostile.
      # Point their bundle-override env vars at the runner's preinstalled rg so
      # the build is deterministic and makes no network fetch here.
      - name: Provide ripgrep for the harness build
        shell: bash
        run: |
          RG="$(command -v rg || true)"
          if [ -z "$RG" ]; then
            if [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get update -qq && sudo apt-get install -y ripgrep; fi
            if [ "$RUNNER_OS" = "Windows" ]; then choco install ripgrep -y --no-progress; fi
            RG="$(command -v rg)"
          fi
          if [ "$RUNNER_OS" = "Windows" ]; then RG="$(cygpath -w "$RG")"; fi
          echo "using rg: $RG"
          echo "GROK_TOOLS_BUNDLE_RG_PATH=$RG" >> "$GITHUB_ENV"
          echo "GROK_SHELL_BUNDLE_RG_PATH=$RG" >> "$GITHUB_ENV"

      # rust-toolchain.toml pins the channel (1.92.0); rustup honours it.
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: tr-agent-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: tr-agent-${{ matrix.os }}-

      - name: Build harness (release)
        run: cargo build --release -p xai-grok-pager-bin

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cp "target/release/${{ matrix.bin }}" "${{ matrix.out }}"
          zip -j "${{ matrix.asset }}" "${{ matrix.out }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/release/${{ matrix.bin }}" "${{ matrix.out }}"
          Compress-Archive -Path "${{ matrix.out }}" -DestinationPath "${{ matrix.asset }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 3

  release:
    needs: build
    # Publish whatever built: a green Linux leg should ship even while the
    # Windows leg is still being sorted (the tensorrelay bundle falls back
    # loudly per-platform when an asset is missing).
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          zips=(dist/*.zip)
          if [ ${#zips[@]} -eq 0 ]; then
            echo "::error::no platform artifacts built; nothing to release"
            exit 1
          fi
          echo "Publishing ${#zips[@]} asset(s): ${zips[*]}"
          TAG="tensorrelay-agent-${GITHUB_SHA}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "TensorRelay Agent ${GITHUB_SHA:0:7}" \
            --notes "Harness binary for TensorRelay's Agent surface (ADR-0030), commit ${GITHUB_SHA}." \
            "${zips[@]}" \
          || gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber "${zips[@]}"
